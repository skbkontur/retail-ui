.docs-base:
  extends:
    - .use-install-cache
  when: on_success
  before_script:
    - echo "дока $WORKSPACE"
    - echo "$CI_COMMIT_REF_NAME"
    - PACKAGE_NAME=$WORKSPACE
    - echo "$(node -pe '$PACKAGE_NAME')
    - PACKAGE_VERSION="$(node -pe 'JSON.parse(process.argv[1])["$PACKAGE_NAME"]' '$(npm pkg get version --ws)')"
    - echo "$PACKAGE_NAME" "$PACKAGE_VERSION"
  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/packages/react-ui/.storybook/build/*

React UI Docs:
  stage: docs
  rules:
    - needs: [React UI Publish]
      allow_failure: true
    - when: manual
  extends:
    - .react-ui-workspace
    - .docs-base
  script:
    - echo "дока $WORKSPACE"

Validations Docs:
  stage: docs
  rules:
    - needs: [Validations Publish]
      allow_failure: true
    - when: manual
  extends:
    - .react-ui-validations-workspace
    - .docs-base
  script:
    - echo "дока $WORKSPACE"
