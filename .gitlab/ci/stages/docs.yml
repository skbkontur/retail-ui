.docs-base:
  stage: docs
  extends:
    - .use-install-cache
  needs: [yarn_install]
  before_script:
    - echo "дока $WORKSPACE"
    - echo "$CI_COMMIT_REF_NAME"
    - ALL_PACKAGES_VERSIONS="$(npm pkg get version --ws)"
    - PACKAGE_NAME=$WORKSPACE
    - PACKAGE_VERSION=$(node -pe "JSON.parse('$ALL_PACKAGES_VERSIONS')['$PACKAGE_NAME']")
    - echo "$PACKAGE_NAME" "$PACKAGE_VERSION"
    #     - source .gitlab/ci/scripts/storybook/build.sh $WORKSPACE
    #     - git clone https://oauth2:$GITLAB_COMMITER_TOKEN@git.skbkontur.ru/ui/docs.git ../docs
    #     - mkdir -p ../docs/docs/storybook/react-ui/${TARGET_DIR:=$PACKAGE_VERSION} # use branch name if TARGET_DIR is empty in merge request pipeline
    #     - cp -r ./packages/react-ui/.storybook/build/* ../docs/docs/storybook/react-ui/$TARGET_DIR
    #     - cd ../docs
    #     - git config user.email "ci-commiter@email.com"
    #     - git config user.name "ci-commiter"
    #     - git add .
    #     - git commit -m "deploy docs from ci job $CI_JOB_ID"
    #     - git pull --rebase
    #     - git push origin master
  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/packages/react-ui/.storybook/build/*

React UI Docs:
  extends:
    - .docs-base
    - .react-ui-workspace
  rules:
    - if: $CI_COMMIT_TAG !~ $REACT_UI_RELEASE_TAG_REGEXP
      when: manual
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP
      needs: [React UI Publish]
      when: on_success

Validations Docs:
  extends:
    - .react-ui-validations-workspace
    - .docs-base
  rules:
    - if: $CI_COMMIT_TAG !~ $VALIDATIONS_RELEASE_TAG_REGEXP
      when: manual
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
      needs: [Validations Publish]
      when: on_success
