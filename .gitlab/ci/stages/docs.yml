.docs-base:
  extends:
    - .use-install-cache
  before_script:
    - echo "дока $WORKSPACE"
    - echo "$CI_COMMIT_REF_NAME"
    - PACKAGE_NAME=$WORKSPACE
    - node -e "console.log($PACKAGE_NAME)"
    - PACKAGE_VERSION=$(node -pe 'JSON.parse(process.argv[1])[\"$PACKAGE_NAME\"]' $(npm pkg get version --ws))
    - echo "$PACKAGE_NAME" "$PACKAGE_VERSION"
  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/packages/react-ui/.storybook/build/*

React UI Docs:
  stage: docs
  extends:
    - .react-ui-workspace
    - .docs-base
  rules:
    - when: manual
  script:
    - echo "дока $WORKSPACE"

Validations Docs:
  stage: docs
  extends:
    - .react-ui-validations-workspace
    - .docs-base
  rules:
    - when: manual
  script:
    - echo "дока $WORKSPACE"
