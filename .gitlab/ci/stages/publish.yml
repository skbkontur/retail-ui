.publish-base:
  extends:
    - .use-install-cache
  stage: publish
  before_script:
    - echo //registry.npmjs.org/:_authToken=test >> .npmrc
    # - npm whoami
  script:
    - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE
  after_script:
    # - rm -rf .npmrc
  artifacts:
    when: always
    paths:
      - $CI_PROJECT_DIR/packages/react-ui/package.json
      - $CI_PROJECT_DIR/packages/react-ui/.npmrc

React UI Publish:
  extends:
    - .publish-base
    - .react-ui-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP
    - if: $CI_COMMIT_TAG !~ $RELEASE_TAG_REGEXP
      when: manual

Validations Publish:
  extends:
    - .publish-base
    - .react-ui-validations-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
