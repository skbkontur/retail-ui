.publish-base:
  extends:
    - .use-install-cache
  stage: publish
  before_script:
    - echo //registry.npmjs.org/:_authToken=$NPM_TOKEN > .npmrc
    - npm whoami
  script:
    - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE
  after_script:
    - rm -rf .npmrc

React UI Publish:
  extends:
    - .publish-base
    - .react-ui-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP
    - if: $CI_COMMIT_TAG !~ $RELEASE_TAG_REGEXP
      when: manual

Validations Publish:
  extends:
    - .publish-base
    - .react-ui-validations-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
