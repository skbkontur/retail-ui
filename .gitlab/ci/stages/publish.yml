.publish-base:
  extends:
    - .use-install-cache
  stage: publish
  before_script:
    - export TEST_TOKEN=SUPER_TOKEN
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
    - echo "//registry.npmjs.org/:_authToken=${TEST_TOKEN}" > .npmrc2
    - cat .npmrc2
  script:
    - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE
  after_script:
    - rm -rf $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc
    - rm -rf .npmrc

React UI Publish:
  extends:
    - .publish-base
    - .react-ui-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP
    - if: $CI_COMMIT_TAG !~ $RELEASE_TAG_REGEXP
      when: manual

Validations Publish:
  extends:
    - .publish-base
    - .react-ui-validations-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
