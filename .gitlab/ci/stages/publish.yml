React-UI · Publish:
  extends:
    - .react-ui-workspace
    - .use-install-cache
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^@skbkontur\/react-ui\/.*$/
      when: always
    - when: manual
  script:
    - echo "добавить кукисы, дальше работать не будет"
    - npm config set "//registry.npmjs.org/:_authToken" "$NPM_TOKEN"
    - npm whoami #check AUTH
    # - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE
    - npm config delete "//registry.npmjs.org/:_authToken"

React-UI · Storybook Docs:
  extends:
    - .react-ui-workspace
    - .use-install-cache
  when: manual
  stage: publish
  script:
    - echo "добавить скрипты, дальше работать не будет"
    - source .gitlab/ci/scripts/storybook/build.sh $WORKSPACE
    - git clone https://oauth2:$GITLAB_COMMITER_TOKEN@git.skbkontur.ru/ui/docs.git ../docs
    - mkdir -p ../docs/docs/storybook/$WORKSPACE/${TARGET_DIR:=$CI_COMMIT_REF_NAME} # use branch name if TARGET_DIR is empty in merge request pipeline
    - cp -r ./packages/react-ui/.storybook/build/* ../docs/docs/storybook/$WORKSPACE/$TARGET_DIR
    - cd ../docs
    - git config user.email "ci-commiter@email.com"
    - git config user.name "ci-commiter"
    - git add .
    - git commit -m "deploy docs from ci job $CI_JOB_ID"
    - git pull --rebase
    - git push origin master

Validations · Publish:
  extends:
    - .react-ui-validations-workspace
    - .use-install-cache
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ /^@skbkontur\/react-ui-validations\/.*$/ # выяснить как стартует
      when: always
    - when: manual
  script:
    - echo "добавить кукисы, дальше работать не будет"
    - source .gitlab/ci/scripts/build/build.sh $WORKSPACE
    - npm config set "//registry.npmjs.org/:_authToken" "%env.NPM_TOKEN%"
    - npm whoami #check AUTH
    - source .gitlab/ci/scripts/publish/deploy.sh
    - npm config delete "//registry.npmjs.org/:_authToken"

Validations · Storybook Docs:
  extends:
    - .react-ui-validations-workspace
    - .use-install-cache
  when: manual
  stage: publish
  script:
    - echo "добавить скрипты, дальше работать не будет"
