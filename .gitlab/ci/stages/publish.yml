.publish-base:
  extends:
    - .use-install-cache
  stage: publish
  before_script:
    - ls -a
    - cat .npmrc
    - echo "registry=https://registry.npmjs.org" > .npmrc
    - cat .npmrc
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc
    - echo "registry=https://registry.npmjs.org" > $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc
  script:
    - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE
  after_script:
    - ls -a $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc
    - rm -rf .npmrc
    - rm -rf $CI_PROJECT_DIR/packages/${WORKSPACE#@skbkontur/}/.npmrc

React UI Publish:
  extends:
    - .publish-base
    - .react-ui-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP
    - if: $CI_COMMIT_TAG !~ $RELEASE_TAG_REGEXP
      when: manual

Validations Publish:
  extends:
    - .publish-base
    - .react-ui-validations-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
