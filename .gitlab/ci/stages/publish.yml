.publish-base:
  extends:
    - .use-install-cache
  stage: publish
  script:
    - echo "добавить кукисы, дальше работать не будет"
    - echo //registry.npmjs.org/:_authToken=$NPM_TOKEN > .npmrc
    - npm whoami #check AUTH
    # - source .gitlab/ci/scripts/build/build.sh $WORKSPACE
    # - source .gitlab/ci/scripts/publish/release.sh $WORKSPACE

React UI Publish:
  extends:
    - .publish-base
    - .react-ui-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $REACT_UI_RELEASE_TAG_REGEXP

Validations Publish:
  extends:
    - .publish-base
    - .react-ui-validations-workspace
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG =~ $VALIDATIONS_RELEASE_TAG_REGEXP
