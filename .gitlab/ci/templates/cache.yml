.cache_common: &cache_common
  key:
    files:
      - yarn.lock
      - packages/react-ui/package.json
      - packages/react-ui-validations/package.json
  paths:
    - '**/node_modules/'

.cache_push:
  cache:
    <<: *cache_common
    policy: push

.use-install-cache:
  cache:
    <<: *cache_common
    policy: pull
